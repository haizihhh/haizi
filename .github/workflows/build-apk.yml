name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'main.py'
      - 'network.py'
      - 'buildozer.spec'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk git zip unzip autoconf libtool \
            pkg-config zlib1g-dev libncurses-dev cmake \
            libffi-dev libssl-dev python3-pip

      - name: Install Buildozer
        run: pip install buildozer

      - name: Fix p4a recipe URLs and build APK
        run: |
          set -e

          # Remove broken pre-existing Android SDK/NDK
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          [ -d "$SDK_DIR" ] && rm -rf "$SDK_DIR"
          unset ANDROID_HOME ANDROID_SDK_ROOT

          # Pre-populate p4a at the workspace path that buildozer uses,
          # then patch recipes with a reliable Python script
          P4A_DIR=".buildozer/android/platform/python-for-android"
          mkdir -p "$(dirname "$P4A_DIR")"
          [ -d "$P4A_DIR" ] && rm -rf "$P4A_DIR"
          git clone --depth 1 -b develop https://github.com/kivy/python-for-android.git "$P4A_DIR"

          python3 << 'PYEOF'
          import re, urllib.request, urllib.error, sys, os

          spec_path = "buildozer.spec"
          with open(spec_path) as f:
              spec = f.read()
          m = re.search(r'hostpython3==(\d+\.\d+)', spec)
          py_ver = m.group(1) if m else "3.11"
          print(f"Target Python version: {py_ver}")

          # Probe GitHub for latest existing patch tag (HEAD requests)
          full_version = None
          print(f"Probing for latest {py_ver}.x tag...")
          for patch in range(25, 0, -1):
              test_ver = f"{py_ver}.{patch}"
              url = f"https://github.com/python/cpython/archive/refs/tags/v{test_ver}.tar.gz"
              try:
                  req = urllib.request.Request(url, method="HEAD")
                  req.add_header("User-Agent", "github-actions-buildozer")
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      full_version = test_ver
                      print(f"  Found: v{full_version}")
                      break
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      continue
              except Exception as e:
                  print(f"  Probe error at v{test_ver}: {e}")
                  continue

          if not full_version:
              # Fallback versions for common Python releases
              fallback = {"3.10": "3.10.16", "3.11": "3.11.15", "3.12": "3.12.11"}
              full_version = fallback.get(py_ver, f"{py_ver}.11")
              print(f"Fallback version: {full_version}")

          # Patch hostpython3 and python3 recipes
          p4a_dir = ".buildozer/android/platform/python-for-android"
          for recipe_name in ["hostpython3", "python3"]:
              recipe_path = os.path.join(p4a_dir, "pythonforandroid", "recipes", recipe_name, "__init__.py")
              if not os.path.exists(recipe_path):
                  print(f"  SKIP {recipe_name}: not found")
                  continue

              with open(recipe_path) as f:
                  content = f.read()

              old_ver = re.search(r"version\s*=\s*['\"]([^'\"]+)", content)
              old_val = old_ver.group(1) if old_ver else "???"

              # Replace version = '...' or version = "..."
              new_content = re.sub(
                  r"(version\s*=\s*['\"])[^'\"]*(['\"])",
                  rf"\g<1>{full_version}\g<2>",
                  content
              )

              with open(recipe_path, 'w') as f:
                  f.write(new_content)

              # Verify
              v = re.search(r"version\s*=\s*['\"]([^'\"]+)", new_content)
              new_val = v.group(1) if v else "FAILED"
              print(f"  {recipe_name}: '{old_val}' -> '{new_val}'")

          # Quick verify the download URL will work
          test_url = f"https://github.com/python/cpython/archive/refs/tags/v{full_version}.tar.gz"
          print(f"\nVerifying download URL: {test_url}")
          try:
              req = urllib.request.Request(test_url, method="HEAD")
              req.add_header("User-Agent", "github-actions-buildozer")
              with urllib.request.urlopen(req, timeout=15) as resp:
                  print(f"  URL OK (HTTP {resp.status})")
          except Exception as e:
              print(f"  WARNING: URL check failed: {e}")
              print(f"  Will try to build anyway...")

          print("\nReady to build.")

          # ---- libffi: work around removed LT_SYS_SYMBOL_USCORE in libtool >= 2.4.7 ----
          libffi_path = os.path.join(p4a_dir, "pythonforandroid", "recipes", "libffi", "__init__.py")
          if os.path.exists(libffi_path):
              with open(libffi_path) as f:
                  content = f.read()
              # Replace: shprint(sh.Command('./autogen.sh'), _env=env)
              # With: inject stub macro, then run autogen.sh
              old = "shprint(sh.Command('./autogen.sh'), _env=env)"
              new = (
                  "# Fix: libtool >= 2.4.7 removed LT_SYS_SYMBOL_USCORE\n"
                  "        with open('m4/lt_sys_symbol_uscope.m4', 'w') as _f:\n"
                  "            _f.write('AC_DEFUN([LT_SYS_SYMBOL_USCORE], [])\\n')\n"
                  "        shprint(sh.Command('./autogen.sh'), _env=env)"
              )
              if old in content:
                  content = content.replace(old, new)
                  with open(libffi_path, 'w') as f:
                      f.write(content)
                  print("  PATCHED libffi: inject LT_SYS_SYMBOL_USCORE stub before autogen.sh")
              else:
                  print(f"  WARN libffi: could not find autogen.sh pattern")
          else:
              print("  SKIP libffi: recipe not found")
          PYEOF

          # Build APK
          export BUILDOZER_WARN_ON_ROOT=1
          buildozer android debug 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrustChat-APK
          path: bin/*.apk
          retention-days: 7
