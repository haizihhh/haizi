name: Build Android APK

on:
  workflow_dispatch:  # 手动触发
  push:
    paths:
      - 'main.py'
      - 'network.py'
      - 'buildozer.spec'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk git zip unzip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake \
            libffi-dev libssl-dev python3-pip

      - name: Install Buildozer
        run: pip install buildozer

      - name: Fix p4a recipe URLs
        run: |
          PY_VER=$(grep -oP 'hostpython3==\K\d+\.\d+' buildozer.spec)
          echo "Target Python: $PY_VER"

          # Get latest patch version from GitHub API
          FULL_VERSION=$(curl -s "https://api.github.com/repos/python/cpython/git/refs/tags" | \
            python3 -c "
      import json, sys, re
      tags = json.load(sys.stdin)
      py_ver = '$PY_VER'
      versions = []
      for t in tags:
          name = t['ref'].replace('refs/tags/', '')
          m = re.match(rf'^v{re.escape(py_ver)}\.(\d+)$', name)
          if m:
              versions.append((int(m.group(1)), name))
      if versions:
          versions.sort(reverse=True)
          print(versions[0][1][1:])
      else:
          # fallback
          f = {'3.10': '3.10.11', '3.11': '3.11.11', '3.12': '3.12.8'}
          print(f.get(py_ver, f'{py_ver}.11'))
      ")
          echo "Full version: $FULL_VERSION"

          # Clone p4a and patch version
          P4A_DIR="$HOME/.buildozer/android/platform/python-for-android"
          mkdir -p "$(dirname "$P4A_DIR")"
          git clone --depth 1 -b develop https://github.com/kivy/python-for-android.git "$P4A_DIR"

          for recipe in hostpython3 python3; do
            RECIPE_FILE="$P4A_DIR/pythonforandroid/recipes/$recipe/__init__.py"
            if [ -f "$RECIPE_FILE" ]; then
              sed -i "s/version\s*=\s*['\"]${PY_VER}['\"]/version = '${FULL_VERSION}'/g" "$RECIPE_FILE"
              echo "Patched $recipe: version -> $FULL_VERSION"
            fi
          done

      - name: Build APK
        run: |
          export BUILDOZER_WARN_ON_ROOT=1
          buildozer android debug 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrustChat-APK
          path: bin/*.apk
          retention-days: 7
