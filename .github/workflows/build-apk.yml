name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'main.py'
      - 'network.py'
      - 'buildozer.spec'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk git zip unzip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake \
            libffi-dev libssl-dev python3-pip

      - name: Install Buildozer
        run: pip install buildozer

      - name: Fix p4a recipe URLs and build APK
        run: |
          set -e

          # Get target Python version from buildozer.spec
          PY_VER=$(grep -oP 'hostpython3==\K\d+\.\d+' buildozer.spec)
          echo "Target Python version: $PY_VER"

          # Get latest patch version via GitHub API, with fallback
          if [ "$PY_VER" = "3.11" ]; then
            FULL_VERSION="3.11.11"
          elif [ "$PY_VER" = "3.10" ]; then
            FULL_VERSION="3.10.11"
          elif [ "$PY_VER" = "3.12" ]; then
            FULL_VERSION="3.12.8"
          else
            FULL_VERSION="${PY_VER}.11"
          fi
          echo "Full version: $FULL_VERSION"

          # Clone python-for-android and patch recipe versions
          P4A_DIR="$HOME/.buildozer/android/platform/python-for-android"
          mkdir -p "$(dirname "$P4A_DIR")"
          git clone --depth 1 -b develop https://github.com/kivy/python-for-android.git "$P4A_DIR"

          for recipe in hostpython3 python3; do
            RECIPE_FILE="$P4A_DIR/pythonforandroid/recipes/$recipe/__init__.py"
            if [ -f "$RECIPE_FILE" ]; then
              sed -i "s/version\\s*=\\s*['\"]${PY_VER}['\"]/version = '${FULL_VERSION}'/g" "$RECIPE_FILE"
              echo "Patched $recipe: version -> $FULL_VERSION"
            fi
          done

          # Build APK
          export BUILDOZER_WARN_ON_ROOT=1
          buildozer android debug 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrustChat-APK
          path: bin/*.apk
          retention-days: 7
