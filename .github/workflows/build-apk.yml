name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'main.py'
      - 'network.py'
      - 'buildozer.spec'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk git zip unzip autoconf libtool \
            pkg-config zlib1g-dev libncurses-dev cmake \
            libffi-dev libssl-dev python3-pip

      - name: Install Buildozer
        run: pip install buildozer

      - name: Fix p4a recipe URLs and build APK
        run: |
          set -e

          # Get target Python version from buildozer.spec
          PY_VER=$(grep -oP 'hostpython3==\K\d+\.\d+' buildozer.spec)
          echo "Target Python version: $PY_VER"

          # Get latest patch version via GitHub API, with fallback
          if [ "$PY_VER" = "3.11" ]; then
            FULL_VERSION="3.11.11"
          elif [ "$PY_VER" = "3.10" ]; then
            FULL_VERSION="3.10.11"
          elif [ "$PY_VER" = "3.12" ]; then
            FULL_VERSION="3.12.8"
          else
            FULL_VERSION="${PY_VER}.11"
          fi
          echo "Full version: $FULL_VERSION"

          # Pre-populate python-for-android at the WORKSPACE path that
          # buildozer actually uses (not $HOME/.buildozer).
          # Buildozer skips cloning if this directory already exists.
          P4A_DIR=".buildozer/android/platform/python-for-android"
          mkdir -p "$(dirname "$P4A_DIR")"
          if [ -d "$P4A_DIR" ]; then
            echo "Removing stale p4a clone..."
            rm -rf "$P4A_DIR"
          fi
          git clone --depth 1 -b develop https://github.com/kivy/python-for-android.git "$P4A_DIR"

          for recipe in hostpython3 python3; do
            RECIPE_FILE="$P4A_DIR/pythonforandroid/recipes/$recipe/__init__.py"
            if [ -f "$RECIPE_FILE" ]; then
              # Replace version string regardless of current value (handles '3.11', '3.11.x', "3.11" etc.)
              sed -i -E "s/(version\\s*=\\s*['\"])[^'\"]*(['\"])/\\1${FULL_VERSION}\\2/g" "$RECIPE_FILE"
              echo "Patched $recipe: version -> $FULL_VERSION"
            fi
          done

          # Remove any pre-existing Android SDK directory so buildozer
          # downloads a fresh one. (mkdir in previous runs creates an
          # empty dir that tricks buildozer into thinking SDK is installed.)
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          if [ -d "$SDK_DIR" ]; then
            echo "Removing pre-existing Android SDK directory..."
            rm -rf "$SDK_DIR"
          fi

          # Unset system Android SDK env vars to avoid conflicts with
          # the pre-installed SDK on GitHub Actions runners
          unset ANDROID_HOME
          unset ANDROID_SDK_ROOT

          # Build APK
          export BUILDOZER_WARN_ON_ROOT=1
          buildozer android debug 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrustChat-APK
          path: bin/*.apk
          retention-days: 7
