name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'main.py'
      - 'network.py'
      - 'buildozer.spec'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk git zip unzip autoconf libtool \
            pkg-config zlib1g-dev libncurses-dev cmake \
            libffi-dev libssl-dev python3-pip

      - name: Install Buildozer
        run: pip install buildozer

      - name: Fix p4a recipe URLs and build APK
        run: |
          set -e

          # Remove broken pre-existing Android SDK/NDK
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          [ -d "$SDK_DIR" ] && rm -rf "$SDK_DIR"
          unset ANDROID_HOME ANDROID_SDK_ROOT

          # Pre-populate p4a at the workspace path that buildozer uses,
          # then patch recipes with a reliable Python script
          P4A_DIR=".buildozer/android/platform/python-for-android"
          mkdir -p "$(dirname "$P4A_DIR")"
          [ -d "$P4A_DIR" ] && rm -rf "$P4A_DIR"
          git clone --depth 1 -b develop https://github.com/kivy/python-for-android.git "$P4A_DIR"

          python3 << 'PYEOF'
          import re, urllib.request, urllib.error, sys, os

          spec_path = "buildozer.spec"
          with open(spec_path) as f:
              spec = f.read()
          m = re.search(r'hostpython3==(\d+\.\d+)', spec)
          py_ver = m.group(1) if m else "3.10"
          print(f"Target Python version: {py_ver}")

          # Probe GitHub for latest existing patch tag (HEAD requests)
          full_version = None
          print(f"Probing for latest {py_ver}.x tag...")
          for patch in range(25, 0, -1):
              test_ver = f"{py_ver}.{patch}"
              url = f"https://github.com/python/cpython/archive/refs/tags/v{test_ver}.tar.gz"
              try:
                  req = urllib.request.Request(url, method="HEAD")
                  req.add_header("User-Agent", "github-actions-buildozer")
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      full_version = test_ver
                      print(f"  Found: v{full_version}")
                      break
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      continue
              except Exception as e:
                  print(f"  Probe error at v{test_ver}: {e}")
                  continue

          if not full_version:
              # Fallback versions for common Python releases
              fallback = {"3.10": "3.10.16", "3.11": "3.11.15", "3.12": "3.12.11"}
              full_version = fallback.get(py_ver, f"{py_ver}.11")
              print(f"Fallback version: {full_version}")

          # Patch hostpython3 and python3 recipes
          p4a_dir = ".buildozer/android/platform/python-for-android"
          for recipe_name in ["hostpython3", "python3"]:
              recipe_path = os.path.join(p4a_dir, "pythonforandroid", "recipes", recipe_name, "__init__.py")
              if not os.path.exists(recipe_path):
                  print(f"  SKIP {recipe_name}: not found")
                  continue

              with open(recipe_path) as f:
                  content = f.read()

              old_ver = re.search(r"version\s*=\s*['\"]([^'\"]+)", content)
              old_val = old_ver.group(1) if old_ver else "???"

              # Replace version = '...' or version = "..."
              new_content = re.sub(
                  r"(version\s*=\s*['\"])[^'\"]*(['\"])",
                  rf"\g<1>{full_version}\g<2>",
                  content
              )

              with open(recipe_path, 'w') as f:
                  f.write(new_content)

              # Verify
              v = re.search(r"version\s*=\s*['\"]([^'\"]+)", new_content)
              new_val = v.group(1) if v else "FAILED"
              print(f"  {recipe_name}: '{old_val}' -> '{new_val}'")

          # Quick verify the download URL will work
          test_url = f"https://github.com/python/cpython/archive/refs/tags/v{full_version}.tar.gz"
          print(f"\nVerifying download URL: {test_url}")
          try:
              req = urllib.request.Request(test_url, method="HEAD")
              req.add_header("User-Agent", "github-actions-buildozer")
              with urllib.request.urlopen(req, timeout=15) as resp:
                  print(f"  URL OK (HTTP {resp.status})")
          except Exception as e:
              print(f"  WARNING: URL check failed: {e}")
              print(f"  Will try to build anyway...")

          # Patch libthorvg recipe: fix fragile glob for libomp.so path
          # In NDK r25c the clang lib dir uses 'lib64' instead of 'lib',
          # and libomp.so may be at different paths. Make the glob resilient.
          thorvg_path = os.path.join(p4a_dir, "pythonforandroid", "recipes", "libthorvg", "__init__.py")
          if os.path.exists(thorvg_path):
              with open(thorvg_path) as f:
                  thorvg_content = f.read()

              # Patch libthorvg: replace fragile glob()[0] with resilient search
              # Use regex to find and replace - avoids whitespace mismatch issues
              old_pattern = (
                  r'pattern = join\(self\.ctx\.ndk\.llvm_prebuilt_dir, '
                  r'"lib/clang/\*/lib/linux", lib_arch\)\s*\n'
                  r'\s*clang_lib_dir = glob\(pattern\)\[0\]\s*\n'
                  r'\s*libomp = join\(clang_lib_dir, "libomp\.so"\)\s*\n'
                  r'\s*shprint\(sh\.cp, libomp, join\("install", "lib"\)\)'
              )
              replacement = (
                  '# Try multiple patterns to find libomp.so (NDK path varies by version)\n'
                  '            patterns = [\n'
                  '                join(self.ctx.ndk.llvm_prebuilt_dir, "lib/clang/*/lib/linux", lib_arch, "libomp.so"),\n'
                  '                join(self.ctx.ndk.llvm_prebuilt_dir, "lib64/clang/*/lib/linux", lib_arch, "libomp.so"),\n'
                  '                join(self.ctx.ndk.llvm_prebuilt_dir, "lib", lib_arch + "-linux-android", "libomp.so"),\n'
                  '            ]\n'
                  '            libomp = None\n'
                  '            for pat in patterns:\n'
                  '                matches = glob(pat)\n'
                  '                if matches:\n'
                  '                    libomp = matches[0]\n'
                  '                    print(f"  Found libomp.so: {libomp}")\n'
                  '                    break\n'
                  '            if libomp:\n'
                  '                shprint(sh.cp, libomp, join("install", "lib"))\n'
                  '            else:\n'
                  '                print("  WARNING: libomp.so not found, skipping OpenMP copy")'
              )
              if re.search(old_pattern, thorvg_content):
                  thorvg_content = re.sub(old_pattern, replacement, thorvg_content)
                  with open(thorvg_path, 'w') as f:
                      f.write(thorvg_content)
                  print("  PATCHED libthorvg: libomp.so glob now resilient")
              else:
                  print("  WARNING: libthorvg pattern not matched, skipping patch")
          else:
              print("  SKIP libthorvg: recipe not found")

          # Patch p4a build.py: fix pip upgrade in venv
          # The standard 'pip install -U pip' can corrupt pip's vendored resolvelib.
          # Use ensurepip --upgrade + force-reinstall instead.
          build_py_path = os.path.join(p4a_dir, "pythonforandroid", "build.py")
          if os.path.exists(build_py_path):
              with open(build_py_path) as f:
                  build_py = f.read()

              old_pip_upgrade = '"source venv/bin/activate && pip install -U pip"'
              new_pip_upgrade = (
                  '"source venv/bin/activate && '
                  'python -m ensurepip --upgrade && '
                  'python -m pip install --force-reinstall --no-cache-dir pip setuptools wheel"'
              )
              if old_pip_upgrade in build_py:
                  build_py = build_py.replace(old_pip_upgrade, new_pip_upgrade)
                  with open(build_py_path, 'w') as f:
                      f.write(build_py)
                  print("  PATCHED p4a build.py: pip upgrade now uses ensurepip + force-reinstall")
              else:
                  print("  WARNING: pip upgrade pattern not matched in build.py, skipping patch")
          else:
              print("  SKIP build.py: not found")

          print("\nReady to build.")
          PYEOF

          # Build APK
          export BUILDOZER_WARN_ON_ROOT=1
          buildozer android debug 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrustChat-APK
          path: bin/*.apk
          retention-days: 7
